worker_processes 1;
error_log C:/www/nginx/logs/error.log;
pid       C:/www/nginx/logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       C:/www/nginx/conf/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ---- HTTP: 仅处理 ACME 挑战，其余全部 301 跳 HTTPS ----
    server {
        listen 80;
        server_name micro.fable5.icu;

        location /.well-known/acme-challenge/ {
            root C:/www/letsencrypt;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- HTTPS ----
    server {
        listen 443 ssl;
        server_name micro.fable5.icu;

        ssl_certificate     C:/www/certs/fullchain.pem;
        ssl_certificate_key C:/www/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
