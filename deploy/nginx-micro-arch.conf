# Nginx 反向代理配置 —— 用于「自托管」方式 B
# 作用：把域名请求转发到本机 Express（默认 3000 端口），并为 HTTPS 预留。
#
# 安装步骤（Debian/Ubuntu）：
#   sudo cp deploy/nginx-micro-arch.conf /etc/nginx/sites-available/micro-arch
#   # 编辑文件，把 server_name 改成你的域名
#   sudo ln -sf /etc/nginx/sites-available/micro-arch /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default      # 避免默认站点冲突
#   sudo nginx -t && sudo systemctl reload nginx
#
# 之后用 certbot 开 HTTPS：
#   sudo certbot --nginx -d your.domain.com
#
# 若用 conf.d 风格：把文件放到 /etc/nginx/conf.d/micro-arch.conf 亦可。

server {
    listen 80;
    server_name your.domain.com;   # ← 改成你的域名（如 micro.fable5.icu）

    # 前端与 API 统一反代到本地 Express；同源访问，无需额外 CORS 配置
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Let's Encrypt 证书签发时的验证路径（certbot 会自动写入 location）
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }
}
