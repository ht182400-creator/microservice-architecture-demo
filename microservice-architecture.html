<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微服务系统架构图 · 交互式调用路径</title>
<style>
  :root{
    --gw-s:"#d6451f"; --gw-f:"#ffe9e0";
    --bs-s:"#2b6fd6"; --bs-f:"#e3eefc";
    --in-s:"#1f9d57"; --in-f:"#e2f6ea";
    --act:"#e0552b";
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow-x:hidden;}
  body{
    font-family:"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:#f1f1f0;color:#333;display:flex;flex-direction:column;
    align-items:center;padding:20px 16px 40px;
  }
  header{text-align:center;margin-bottom:12px;width:100%;max-width:1400px;padding:0 16px;}
  header h1{font-size:22px;margin:0 0 4px;font-weight:700;letter-spacing:.5px;}
  header p{margin:0;font-size:13px;color:#777;}

  /* 主容器：左右分栏布局 */
  .main-wrap{
    display:flex;align-items:flex-start;justify-content:center;
    width:100%;max-width:1400px;gap:0;position:relative;
  }

  /* 左侧：架构图区域 */
  .diag-wrap{
    flex:0 0 auto;
    transition:transform .45s cubic-bezier(.22,1,.36,1), opacity .35s ease;
    transform-origin:center center;
  }
  .diag-wrap.panel-open{
    transform:scale(0.66) translateX(-8%);
  }

  .stage{
    width:1100px;background:#fff;border-radius:14px;
    box-shadow:0 6px 28px rgba(0,0,0,.10);padding:14px;
    position:relative;overflow:hidden;
  }
  svg{width:100%;height:auto;display:block;border-radius:8px;}

  /* 节点 */
  .node{cursor:pointer;}
  .node .hit{fill:transparent;transition:fill .15s;}
  .node:hover .hit{fill:rgba(0,0,0,.03);}
  .box{stroke-width:2.2;fill:none;stroke-linejoin:round;stroke-linecap:round;transition:all .3s ease;}
  .box2{stroke-width:1.5;fill:none;stroke-linejoin:round;stroke-linecap:round;transition:all .3s ease;}
  .label{font-size:15px;font-weight:700;fill:#2a2a2a;transition:opacity .35s ease, fill .25s ease;}
  .sub{font-size:11.5px;fill:#777;transition:opacity .35s ease;}
  .badge{font-size:10px;font-weight:600;fill:#fff;pointer-events:none;opacity:0;transition:opacity .25s;}

  /* 边 */
  .edge{fill:none;stroke:#6b6b6b;stroke-width:1.8;opacity:.75;transition:opacity .35s ease, stroke .35s ease, stroke-width .35s ease;}
  .edge-label{font-size:13px;fill:#666;font-style:italic;transition:opacity .35s ease;}
  .edge-detail{font-size:12px;fill:#888;font-style:normal;transition:opacity .35s ease;pointer-events:none;}

  /* 状态类 - 点击激活（强） */
  .dimmed .box,.dimmed .box2{opacity:.12 !important;}
  .dimmed .label,.dimmed .sub{opacity:.15 !important;}
  .dimmed .badge{opacity:0 !important;}
  .hidden-edge{opacity:.04 !important;}
  .active-node .box{stroke:#e0552b;stroke-width:3;filter:drop-shadow(0 2px 6px rgba(224,85,43,.25));}
  .active-node .label,.active-node .sub{opacity:1 !important;}
  .active-node .badge{opacity:1 !important;}
  .active-edge{stroke:#e0552b !important;stroke-width:2.5 !important;opacity:1 !important;}

  /* 悬停预览（弱高亮） */
  .hover-preview .box{stroke:#f09060 !important;stroke-width:2.4 !important;}
  .hover-preview-edge{stroke:#f09060 !important;stroke-width:2.2 !important;opacity:.95 !important;}

  /* 详情面板 - 右侧独立区域 */
  .panel-wrap{
    flex:0 0 360px;min-height:720px;
    opacity:0;transform:translateX(30px);
    transition:opacity .4s ease .1s, transform .45s cubic-bezier(.22,1,.36,1);
    pointer-events:none;
    position:relative;top:-8px;
  }
  .panel-wrap.show{
    opacity:1;transform:translateX(0);
    pointer-events:auto;
  }
  .detail-panel{
    width:100%;min-height:700px;background:rgba(255,255,255,.97);
    border:2px solid #e0552b;border-radius:12px;padding:18px 20px;
    box-shadow:0 8px 32px rgba(224,85,43,.15);
    font-size:13px;line-height:1.65;
    overflow-y:auto;max-height:calc(100vh - 120px);
  }
  .dp-title{font-size:17px;font-weight:800;color:#e0552b;margin:0 0 10px;border-bottom:2px solid #f0f0f0;padding-bottom:8px;}
  .dp-row{display:flex;justify-content:space-between;margin:4px 0;}
  .dp-k{color:#999;font-weight:600;flex-shrink:0;margin-right:12px;}
  .dp-v{color:#333;text-align:right;word-break:break-all;}
  .dp-path{background:#f6f6f6;border-radius:6px;padding:7px 11px;font-family:"Consolas","Courier New",monospace;
    font-size:11.5px;color:#c44d26;margin:6px 0;border-left:3px solid #e0552b;}
  .dp-section{margin-top:12px;padding-top:10px;border-top:1px dashed #ddd;}
  .dp-section-title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.8px;}
  .dp-close{
    float:right;width:26px;height:26px;border:none;
    background:#f0f0f0;border-radius:50%;cursor:pointer;font-size:14px;line-height:26px;
    text-align:center;color:#999;transition:all .2s;margin-top:-4px;
  }
  .dp-close:hover{background:#e0552b;color:#fff;}

  /* 提示条 */
  .toast-bar{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:rgba(45,45,45,.92);color:#e8e8e8;padding:9px 24px;
    border-radius:20px;font-size:13px;pointer-events:none;
    opacity:0;transition:opacity .3s;z-index:100;white-space:nowrap;
  }
  .toast-bar.show{opacity:1;}

  .legend-box{stroke-width:2;fill:none;stroke-linejoin:round;stroke-linecap:round;}
  .legend-text{font-size:13px;fill:#444;}
  .hint-text{font-size:11.5px;fill:#bbb;}

  /* 错误提示 */
  .error-overlay{
    display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:#fee;padding:18px 28px;border:2px solid #c33;border-radius:10px;
    color:#c33;font-family:monospace;font-size:13px;z-index:999;text-align:center;
  }
  .error-overlay.show{display:block;}
</style>
</head>
<body>
  <header>
    <h1>微服务系统架构图 · 交互式调用路径</h1>
    <p>悬停预览连接 · 点击展开详情 · 按 Esc 或点击关闭返回总览</p>
  </header>

  <div class="main-wrap">
    <div class="diag-wrap" id="diagWrap">
      <div class="stage" id="stage">
        <svg id="canvas" viewBox="0 0 1120 750" role="img"></svg>
        <div class="toast-bar" id="toast"></div>
        <div class="error-overlay" id="errOverlay"></div>
      </div>
    </div>
    <div class="panel-wrap" id="panelWrap">
      <div class="detail-panel" id="panel">
        <button class="dp-close" id="panelClose" title="\u5173\u95ed">✕</button>
        <div style="clear:both"></div>
        <div id="panelBody">
          <p style="color:#aaa;text-align:center;padding:40px 0;">选择一个服务查看详情</p>
        </div>
      </div>
    </div>
  </div>

// ========== 手绘工具 ==========
function rnd(a, b) { return a + Math.random() * (b - a); }

function roughEdge(x1, y1, x2, y2, r) {
  r = r || 1.2;
  var dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy) || 1;
  var nx = -dy / len, ny = dx / len;
  var off = rnd(-1, 1) * r * 1.6;
  var mx = (x1 + x2) / 2 + nx * off, my = (y1 + y2) / 2 + ny * off;
  var c1x = x1 + (mx - x1) * 0.5 + rnd(-r, r), c1y = y1 + (my - y1) * 0.5 + rnd(-r, r);
  var c2x = x2 + (mx - x2) * 0.5 + rnd(-r, r), c2y = y2 + (my - y2) * 0.5 + rnd(-r, r);
  return "M" + x1.toFixed(1) + " " + y1.toFixed(1) +
         " Q" + c1x.toFixed(1) + " " + c1y.toFixed(1) + " " + mx.toFixed(1) + " " + my.toFixed(1) +
         " Q" + c2x.toFixed(1) + " " + c2y.toFixed(1) + " " + x2.toFixed(1) + " " + y2.toFixed(1);
}

function roughRect(x, y, w, h, r) {
  r = r || 1.7;
  function pass(rr) {
    return roughEdge(x, y, x + w, y, rr) + " " +
           roughEdge(x + w, y, x + w, y + h, rr) + " " +
           roughEdge(x + w, y + h, x, y + h, rr) + " " +
           roughEdge(x, y + h, x, y, rr);
  }
  return [pass(r), pass(r * 0.72)];
}

function borderPoint(n, tx, ty) {
  var cx = n.x + n.w / 2, cy = n.y + n.h / 2;
  var dx = tx - cx, dy = ty - cy;
  var hw = n.w / 2, hh = n.h / 2;
  if (!dx && !dy) return { x: cx, y: cy };
  var scale = 1 / Math.max(Math.abs(dx) / hw, Math.abs(dy) / hh);
  return { x: cx + dx * scale, y: cy + dy * scale };
}

function orthoRoute(sx, sy, tx, ty) {
  var midY = sy + (ty - sy) * 0.42;
  return "M" + sx.toFixed(1) + " " + sy.toFixed(1) +
         " L" + sx.toFixed(1) + " " + midY.toFixed(1) +
         " L" + tx.toFixed(1) + " " + midY.toFixed(1) +
         " L" + tx.toFixed(1) + " " + ty.toFixed(1);
}

// ---------- 悬停预亮 ----------
function hoverPreview(id) {
  if (activeId) return; // 已激活状态不处理悬停
  hoveredId = id;
  var nb = getNeighbors(id);
  // 高亮目标节点（弱）
  var keys = Object.keys(ndEls);
  for (var ki = 0; ki < keys.length; ki++) {
    var k = keys[ki];
    var el = ndEls[k];
    if (k === id) {
      el.classList.add("hover-preview");
    } else {
      el.classList.remove("hover-preview");
    }
  }
  // 高亮相关边（弱橙色）
  for (var hi = 0; hi < edgeEls.length; hi++) {
    var he = edgeEls[hi];
    if (he.src === id || he.tgt === id) {
      he.el.classList.add("hover-preview-edge");
    } else {
      he.el.classList.remove("hover-preview-edge");
    }
  }
  busG.style.opacity = (id === "gateway") ? "1" : "0.3";
}

function clearHoverPreview() {
  if (activeId) return;
  hoveredId = null;
  var vals = Object.values(ndEls);
  for (var vi = 0; vi < vals.length; vi++) {
    vals[vi].classList.remove("hover-preview");
  }
  for (var hj = 0; hj < edgeEls.length; hj++) {
    edgeEls[hj].el.classList.remove("hover-preview-edge");
  }
  busG.style.opacity = "1";
}

// ---------- 点击激活 ----------
function activate(id) {
  activeId = id;
  // 清除悬停残留
  var vals = Object.values(ndEls);
  for (var vi = 0; vi < vals.length; vi++) {
    vals[vi].classList.remove("hover-preview");
  }
  for (var hj = 0; hj < edgeEls.length; hj++) {
    edgeEls[hj].el.classList.remove("hover-preview-edge");
  }

  var nb = getNeighbors(id);
  var keys = Object.keys(ndEls);
  for (var ki = 0; ki < keys.length; ki++) {
    var k = keys[ki];
    var el = ndEls[k], bd = badges[k];
    if (k === id) {
      el.classList.add("active-node"); el.classList.remove("dimmed");
      if (bd) { bd.bg.style.opacity = "1"; bd.t.textContent = "\u25cf"; }
    } else if (nb.has(k)) {
      el.classList.remove("dimmed"); el.classList.remove("active-node");
      if (bd) { bd.bg.style.opacity = "0.7"; bd.bg.style.fill = "#2b6fd6"; bd.t.textContent = "\u25c9"; }
    } else {
      el.classList.add("dimmed"); el.classList.remove("active-node");
      if (bd) { bd.bg.style.opacity = "0"; }
    }
  }

  for (var ei2 = 0; ei2 < edgeEls.length; ei2++) {
    var ee = edgeEls[ei2];
    var on = (ee.src === id || ee.tgt === id);
    var elg = ee.el._labelG;
    if (on) {
      ee.el.classList.add("active-edge"); ee.el.classList.remove("hidden-edge");
      ee.el.setAttribute("marker-end", "url(#arrowAct)");
      if (elg) elg.style.opacity = "1";
    } else {
      ee.el.classList.remove("active-edge"); ee.el.classList.add("hidden-edge");
      if (elg) elg.style.opacity = "0.06";
    }
  }

  busG.style.opacity = (id === "gateway") ? "1" : "0.1";

  // 缩放架构图 + 显示面板
  diagWrap.classList.add("panel-open");
  renderPanel(id);
  panelWrap.classList.add("show");
  showToast("\u6b63\u5728\u67e5\u770b\uff1a" + nm[id].label + " \u7684\u5b8c\u6574\u8c03\u7528\u94fe\u8def");
}

function deactivate() {
  activeId = null;
  var vals = Object.values(ndEls);
  for (var vi = 0; vi < vals.length; vi++) {
    vals[vi].classList.remove("dimmed"); vals[vi].classList.remove("active-node");
    vals[vi].classList.remove("hover-preview");
  }
  var bvals = Object.values(badges);
  for (var bi = 0; bi < bvals.length; bi++) { bvals[bi].bg.style.opacity = "0"; }

  for (var ei3 = 0; ei3 < edgeEls.length; ei3++) {
    var ee2 = edgeEls[ei3];
    ee2.el.classList.remove("active-edge"); ee2.el.classList.remove("hidden-edge");
    ee2.el.classList.remove("hover-preview-edge");
    ee2.el.setAttribute("marker-end", "url(#arrow)");
    if (ee2.el._labelG) ee2.el._labelG.style.opacity = "1";
  }
  busG.style.opacity = "1";

  // 恢复架构图尺寸 + 隐藏面板
  diagWrap.classList.remove("panel-open");
  panelWrap.classList.remove("show");
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(function () { toast.classList.remove("show"); }, 2200);
}

// ========== 绑定事件 ==========
var nodeKeys = Object.keys(ndEls);
for (var nk = 0; nk < nodeKeys.length; nk++) {
  (function (id) {
    var el = ndEls[id];

    // 悬停预亮
    el.addEventListener("mouseenter", function () { hoverPreview(id); });
    el.addEventListener("mouseleave", function () { clearHoverPreview(); });

    // 点击展开详情
    el.addEventListener("click", function (ev) {
      ev.stopPropagation();
      if (activeId === id) deactivate(); else activate(id);
    });
  })(nodeKeys[nk]);
}

document.getElementById("stage").addEventListener("click", function (ev) {
  var target = ev.target;
  if (target === svg || (target.tagName === "rect" && target.getAttribute("fill") === "url(#grid)")) {
    if (activeId) deactivate();
  }
});

if (panelClose) {
  panelClose.addEventListener("click", function (ev) { ev.stopPropagation(); deactivate(); });
}

document.addEventListener("keydown", function (e) {
  if (e.key === "Escape" && activeId) deactivate();
});

} catch (err) {
  var overlay = document.getElementById("errOverlay");
  if (overlay) {
    overlay.textContent = "JS Error: " + (err.message || err);
    overlay.className = "error-overlay show";
  }
  console.error("Microservice diagram error:", err);
}
})();
</script>
</body>
</html>
